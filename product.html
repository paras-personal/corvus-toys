<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">Product | CorVus Toys</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" href="/favicon.png" sizes="any">
</head>

<body>

<!-- HEADER -->

<header>
  <div class="header-container">

    <div class="logo">
      <a href="index.html">
        <img src="assets/logo.png" alt="CorVus Toys Logo">
      </a>
    </div>

    <button class="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-menu">
      <ul>
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#products">Products</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>

  </div>
</header>


<!-- PRODUCT HERO -->

<section class="product-hero">

  <div class="product-hero-content">
    <h1 id="productTitle"></h1>
    <p class="product-tagline" id="productTagline"></p>
  </div>

</section>


<!-- PRODUCT DETAILS -->

<section class="product-details">

  <div class="product-details-container">

    <div class="product-gallery">

    <div class="main-image">
      <img id="mainProductImage" src="" alt="Product Image">
    </div>

    <div class="thumbnail-images" id="thumbnailContainer">
    </div>

  </div>

    <div class="product-info">

      <h2>About this toy</h2>

      <p id="productDescription"></p>

      <ul id="productHighlights" class="product-highlights"></ul>

      <button class="primary-btn">Buy Now</button>

    </div>

  </div>

</section>


<!-- CTA -->

<section class="product-cta">

<h3>Have questions about this toy?</h3>

<a href="index.html#contact" class="secondary-btn">
Contact Us
</a>

</section>


<!-- FOOTER -->

<footer>
<p>© 2026 CorVus Toys — All Rights Reserved</p>
</footer>


<script src="script.js"></script>

</body>
</html>
